
services:
  postgres:
    image: postgres:16-alpine
    container_name: applypilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - applypilot-network

  minio:
    image: minio/minio:latest
    container_name: applypilot-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"           
      - "9001:9001"           
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - applypilot-network

  # redis:
  #   image: redis:7-alpine
  #   container_name: applypilot-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - applypilot-network


  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: applypilot-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET} 
      NODE_ENV: ${NODE_ENV}
    ports:
      - "5001:5001"
    depends_on:
      - postgres      
    networks:
      - applypilot-network

  resume-service:
    build:
      context: ./services/resume-service
      dockerfile: Dockerfile
    container_name: applypilot-resume
    restart: unless-stopped
    environment:
      DATABASE_URL: ${RESUME_DATABASE_URL}
      MINIO_ENDPOINT: http://minio:9000    
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: resumes
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5002
    ports:
      - "5002:5002"
    depends_on:
      - postgres
      - minio
    networks:
      - applypilot-network

  generation-service:
    build:
      context: ./services/generation-service
      dockerfile: Dockerfile
    container_name: applypilot-generation
    restart: unless-stopped
    environment:
      DATABASE_URL: ${GENERATION_DATABASE_URL}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_RESUMES: resumes
      MINIO_BUCKET_GENERATED: generated-resumes
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}  
      PORT: 5003
    ports:
      - "5003:5003"
    depends_on:
      - postgres
      - minio
    networks:
      - applypilot-network


  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: applypilot-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      RESUME_SERVICE_URL: http://resume-service:5002
      GENERATE_SERVICE_URL: http://generate-service:5003
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    ports:
      - "5000:5000"           
    depends_on:
      - auth-service
      - resume-service
    networks:
      - applypilot-network

volumes:
  postgres_data:
  minio_data:

networks:
  applypilot-network: