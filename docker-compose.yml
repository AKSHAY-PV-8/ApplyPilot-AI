  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: applypilot-auth
    restart: unless-stopped
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET} 
    ports:
      - "5001:5001"
    depends_on:
      - postgres      
    networks:
      - applypilot-network

  # resume-service:
