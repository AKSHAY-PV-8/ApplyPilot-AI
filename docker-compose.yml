  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: applypilot-gateway
    restart: unless-stopped
    environment:
      AUTH_SERVICE_URL: http://auth-service:5001
      # RESUME_SERVICE_URL: http://resume-service:3002
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    ports:
      - "5000:5000"           
    depends_on:
      - auth-service
      # - resume-service
    networks:
      - applypilot-network

volumes:
  postgres_data:
  minio_data:

networks:
  applypilot-network: